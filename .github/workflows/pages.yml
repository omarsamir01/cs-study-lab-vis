name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Prefix for assets (./src/...) when URL has no trailing slash — GitHub Pages project site
      - name: Prepare site
        env:
          REPO: ${{ github.event.repository.name }}
        run: |
          mkdir -p deploy
          cp index.html README.md deploy/
          cp -r styles src deploy/
          touch deploy/.nojekyll
          python3 scripts/pages-inject-base.py deploy/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: deploy

      - uses: actions/deploy-pages@v4
        id: deploy
